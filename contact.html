<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalFood Hub - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="https://picsum.photos/id/29/48/48" alt="Logo">
                <h1>LocalFood Hub</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="restaurants.html" class="nav-link">Restaurants</a>
                <a href="rooms.html" class="nav-link">Rooms</a>
                <a href="banquet.html" class="nav-link">Banquet</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>
            <div class="header-right">
                <button id="cart-btn" class="cart-btn">
                    🛒
                    <span id="cart-count" class="cart-count">0</span>
                </button>
                <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-float">💬</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>Get in touch</h2>
                <p>Call us or WhatsApp for instant support</p>
                <a href="https://wa.me/919876543210" target="_blank" class="btn-whatsapp big">💬 Chat on WhatsApp</a>
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3671.123456789!2d72.929!3d22.552!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e8c1234567890%3A0x1234567890!2sAnand%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1234567890" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
            <div class="contact-form">
                <h3>Send us a message</h3>
                <form onsubmit="handleContact(event)">
                    <input type="text" placeholder="Your name" required>
                    <input type="tel" placeholder="Phone number" required>
                    <textarea placeholder="Your message" required></textarea>
                    <button type="submit" class="btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 LocalFood Hub - Made for small towns in Gujarat</p>
        </div>
    </footer>

    <!-- CART MODAL -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Your Cart</h3>
                <span id="modal-close" class="close">&times;</span>
            </div>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-price">₹0</span>
            </div>
            <button onclick="orderOnWhatsApp()" class="btn-whatsapp">Order on WhatsApp</button>
            <button onclick="clearCart()" class="btn-secondary">Clear Cart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                      </html>
