<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedson Hotel And Resort- Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="https://picsum.photos/id/29/48/48" alt="Logo">
                <h1>Wedson Hotel And Resort</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="restaurants.html" class="nav-link">Restaurants</a>
                <a href="rooms.html" class="nav-link">Rooms</a>
                <a href="banquet.html" class="nav-link">Banquet</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
            <div class="header-right">
                <button id="cart-btn" class="cart-btn">
                    🛒
                    <span id="cart-count" class="cart-count">0</span>
                </button>
                <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-float">💬</a>
            </div>
        </div>
    </header>

    <!-- RESTAURANT HERO -->
    <div id="restaurant-hero" class="restaurant-hero"></div>

    <div class="container">
        <!-- ABOUT -->
        <section id="about-section" class="about-section"></section>

        <!-- GALLERY -->
        <section class="gallery-section">
            <h2>Gallery</h2>
            <div id="gallery-grid" class="gallery-grid"></div>
        </section>

        <!-- MENU -->
        <section class="menu-section">
            <h2>Menu</h2>
            <div id="menu-container"></div>
        </section>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Wedson Hotel And Resort- Made for small towns in Ghatampur</p>
        </div>
    </footer>

    <!-- CART MODAL -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Your Cart • <span id="cart-restaurant-name"></span></h3>
                <span id="modal-close" class="close">&times;</span>
            </div>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-price">₹0</span>
            </div>
            <button onclick="orderOnWhatsApp()" class="btn-whatsapp">Order on WhatsApp</button>
            <button onclick="clearCart()" class="btn-secondary">Clear Cart</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
  </html>
